<!DOCTYPE html>
<html>
    <header>
        <meta charset="UTF-8">
    </header>
    <body>
        <table border="0"  width="100%" cellspacing="0">
            <tr>
                <td width="200px" bgcolor="#1334BF">

                </td>
                <td  align="right" colspan="4">
                    <div >
                        <img src="images/bell.png" width="30px" height="30px">
                        <img src="images/soudha.jpg" width="30px" height="30px">
                        <img src="images/logout (2).png" width="30px" height="30px">
                        <span>Logout</span>
                    </div>
                    <hr>
                </td>
            </tr>
            <tr>
                <td align="center" bgcolor="#1334BF">
                    <div align="center">
                            <font color="#ffffff" size="5">
                            Hire Me Now!
                            </font>
                        </div>
                </td>
                <td   align="center" height="50px">
                    <section  >
                        <span>Company Profile</span>
                    </section>
                </td>
                <td  align="center" height="50px">
                    <section  >
                        <span >Update Profile</span>
                    </section>
                </td>
                <td  align="center" height="50px">
                    <section  >
                        <span>Change UserName</span>
                    </section>
                </td >
                <td align="center" height="50px">
                    <section  >
                        <span>Change Password</span>
                    </section>
                </td>
            </tr>
            <tr>
                <td height="300px" width="10px" valign="top" bgcolor="#1334BF">
                    <aside>
                        <br>
                        <br>
                        <br>
                        <section>
                            <div align="left">
                                <font color="#ffffff" size="3" >
                                    <img src="images/dashboard 1 (1).png" width="15px" height="15px">
                                    <span>Dashboard</span><br><br>
                                    <img src="images/suitcase 2.png" width="15px" height="15px">
                                    <span>Jobs</span><br><br>
                                    <img src="images/application (1) 1.png" width="15px" height="15px">
                                    <span>Applications</span><br><br>
                                    <img src="images/icons8-interviews-64.png" width="15px" height="15px">
                                    <span>Interviews</span><br><br>
                                    <img src="images/message 1.png" width="15px" height="15px">
                                    <span>Messages</span><br><br>
                                    <img src="images/settings 1.png" width="15px" height="15px">
                                    <span>Settings</span><br><br>
                                    <br><br>
                                    <br><br>
                                </font>
                                <div align="left">
                                    <img src="images/add-group (1) 1.png" width="50px" height="50px">
                                    <font size="4" color="black"> Add New </font>
                                </div>
                            </div>
                        </section>
                        
                    </aside>
                </td>
                <td colspan="4" valign="top" align="center" >
                    <section >
                        <table border="0" cellspacing="0" width="750px"  cellpadding="10px">
                            <tr>
                                <td align="left">
                                    <font size="4">Change UserName</font>
                                    <hr>
                                </td>
                            </tr>
                        </table>
                        <table cellspacing="0" width="750px">
                            <form>
                                <tr>
                                    <td colspan="3">
                                        <label>Full Name:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your full name"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>User Name:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your user name"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>Email:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your email address"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>Phone Number:</label><br>
                                        <input type="text" size="20" placeholder="Please enter your phone number"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <button> Update Profile</button>
                                    </td>
                                    <td>
                                        <input type="checkbox" value="push"> Push Notifications
                                    </td>
                                    <td>
                                        <input type="checkbox" value="email"> Email Notifications
                                    </td>
                                </tr>
                            </form>
                        </table>
                        <table border="0" cellspacing="0" width="750px"  cellpadding="10px">
                            <br><br><br>
                            <tr>
                                <td align="left">
                                    <font size="4">Password Change</font>
                                    <hr>
                                </td>
                            </tr>
                        </table>
                        <table cellspacing="0" width="750px">
                            <form>
                                <tr>
                                    <td colspan="3">
                                        <label>UserId:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your user id"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>Old Password:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your old password"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>New Password:</label><br>
                                        <input type="text" size="70" placeholder="Please enter your new password"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3">
                                        <label>Confirm Password:</label><br>
                                        <input type="text" size="20" placeholder="Confirm new password"><br><br>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <button> Update Profile</button>
                                    </td>
                                    <td>
                                        <input type="checkbox" value="push"> Push Notifications
                                    </td>
                                    <td>
                                        <input type="checkbox" value="email"> Email Notifications
                                        <br><br> 
                                    </td>
                                </tr>
                            </form>
                        </table>
                    </section>
                </td>
            </tr>
            <tr>
                <td rowspan="" colspan="5" bgcolor="#1334BF" height="100px">

                </td>
            </tr>
        </table>
    </body>
</html>
